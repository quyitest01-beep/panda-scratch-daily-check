name: Panda Scratch Daily Perf Check

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 2:00 = 北京时间 10:00
  workflow_dispatch:  # 支持手动触发

jobs:
  perf-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Run daily check and send report
      env:
        PANDA_EMAIL: ${{ secrets.PANDA_EMAIL }}
        PANDA_PASSWORD: ${{ secrets.PANDA_PASSWORD }}
        FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
        FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
      run: |
        node daily-check-and-report.js
        
    - name: Upload report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: daily-report
        path: daily-report.txt
